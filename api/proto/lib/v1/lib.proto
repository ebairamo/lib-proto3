syntax = "proto3";
package libproto.v1;
option go_package = "github.com/ebairamo/lib-proto3/gen/go/lib/v1;libprotov1"; 

service Library {
    rpc CreateBook (BookCreate) returns(Book);
    rpc GetBook (BookID) returns (Book);
    rpc GetAll(GetAllRequest) returns (GetAllResponse);
}
message Book {
    string id = 1;
    string author = 2;
    reserved 3;
    reserved "name";
    string title = 4;
}

message BookCreate {
    string author = 1;
    string name = 2;
}

message BookID {
    string id = 1;
}
message GetAllRequest {}

message GetAllResponse{
    repeated Book books = 1;
}